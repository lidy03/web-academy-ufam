<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="style.css">
    <title>TO DO LIST</title>
</head>
<body>
    <h1>TO DO LIST</h1>
        <div class="layout-columns">
            <div class="column-form">
                <h3>Lista de tarefas</h3>
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="form-group">
                        <label for="title">Titulo</label>
                        <input type="text" id="title" placeholder="Digite o título da tarefa" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Descrição (Opcional)</label>
                        <textarea id="description" placeholder="Digite a descrição da tarefa" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="due-date">Data Limite (Opcional)</label>
                        <input type="date" id="due-date">
                    </div>
                    <button type="submit" id="btn-save">Adicionar</button>
                    <button type="button" id="btn-cancel" class="btn-cancel">Cancelar</button>
                </form>
            </div>
            <div class="column-list">
                <h3>Minhas Tarefas</h3>
                <div id="task-list"></div>
            </div>
        </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
