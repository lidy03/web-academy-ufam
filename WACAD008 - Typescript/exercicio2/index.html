<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="./src/css/style.css">
    <title>Turma de Educação Física</title>
</head>
<body>
    <h1>Turma</h1>
        <div class="layout-columns">
            <div class="column-form">
                <h3>Cadastrar Alunos</h3>
                <form id="student-form">
                    <input type="hidden" id="student-id">
                    <div class="form-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="student-name" placeholder="Digite o nome do aluno" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Idade</label>
                        <input type="number" id="student-age" placeholder="Digite a idade" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="height">Altura</label>
                        <input type="number" id="student-height" placeholder="Digite a altura" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Peso</label>
                        <input type="number" id="student-weight" placeholder="Digite o peso" step="0.01" required>
                    </div>
                    <button type="submit" id="btn-save">Adicionar</button>
                    <button type="button" id="btn-auto">Gerar aluno</button>
                    <button type="button" id="btn-cancel" class="btn-cancel">Cancelar</button>
                </form>
            </div>

            <div class="students-table">
            <h2>Alunos da Turma</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Altura</th>
                        <th>Peso</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                </tbody>
            </table> 
        </div>
    </div>

        <div class="column-list">
                <h3>Estatísticas</h3>
                <div id="stats-list"></div>
        </div>
<script type="module" src="./src/main.ts"></script>
</body>
</html>
