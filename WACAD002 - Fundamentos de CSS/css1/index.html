<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS1</title>
    <style type="text/css">
        div{
            width: 90%;
            border: 15px solid black;
            border-radius: 30px 100px 30px 100px;
            background-color: rgb(173, 173, 173);
            padding: 30px 25px;
            margin: 20px auto;
            display: inline-block;
            font-size: 30px;
            font-family: serif;
            

        }
    </style>
</head>
<body>
    <div>
        O CSS é uma linguagem de estilo, também 
        conhecida como linguagem de folhas de 
        estilo em cascata, usada para personalizar  
        visual de um site ou aplicação.
    </div>
</body>
</html>
