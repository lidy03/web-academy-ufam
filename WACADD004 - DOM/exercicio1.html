<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compra</title>
  </head>  
    <body>
      <div id="resumo-carrinho">
        <h2>Fechamento do Pedido</h2>
        
        <!-- Valores que o JS precisa ler -->
        <label>Subtotal dos Produtos (R$):</label>
        <input type="number" id="valor-subtotal" value="150.00">
        <br><br>

        <label>Valor do Frete (R$):</label>
        <input type="number" id="valor-frete" value="25.50">
        <br><br>

        <!-- Lista para ser contada -->
        <h3>Itens na sua caixa:</h3>
        <ul id="lista-produtos">
          <li class="produto-comprado">Camiseta Básica Preta</li>
          <li class="produto-comprado">Calça Jeans Tradicional</li>
          <li class="produto-comprado">Par de Meias Brancas</li>
        </ul>
      </div>

      <script>
        const produto = document.querySelectorAll(".produto-comprado");
        const quantidade = produto.length;
        const subtotal = document.getElementById("valor-subtotal").value;
        const frete = document.getElementById("valor-frete").value;
        const total = Number(subtotal) + Number (frete);

        console.log("Quantidade de itens na caixa: ", quantidade);
        console.log("Subtotal: ", subtotal);
        console.log("Frete: ", frete);
        console.log("Total a pagar: ", total);
      </script>
    </body>
</html>
